server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # SPA fallback — 所有 /asuka/* 路由指向 index.html
    location /asuka {
        try_files $uri $uri/ /asuka/index.html;
    }

    # Cache static assets
    location /asuka/assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
